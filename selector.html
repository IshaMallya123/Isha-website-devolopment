<!DOCTYPE html>
<html>
    <head>
        <title>slector</title>
        <style>
            /*class selecter*/
            .green{background-color: blueviolet;}
            /*id selector*/
            #red{
                background-color: rgb(143, 202, 242);
            }
            *{
                background-color: beige;
            }
            p,h1{
                color:blue;
            }
        </style>
    </head>
    <body>
        <h1 class="green">I am green</h1>
        <h1 id="red">I am red</h1>
        <p>I am paragraph</p>
    </body>
</html>
