<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
    </head>
    <body>
        <form action="/action_page.php" oninput="answer.value=parseInt(n1.value)-parseInt(n2.value)">
            <fieldset>
                <legend>Calculator</legend>
                <label>
              enter number one
            </label>
            <input type="number" id="n1" name="n1"><br>
            <label>
                enter number two
            </label>
            <input type="number" id="n2" name="n2"><br>
            <output name="answer" for="n1 n2"></output>
            
            </fieldset>
            
        </form>
    </body>
</html>
