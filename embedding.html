<!DOCTYPE html>
<html>
    <head>
        <title>Embedding</title>
        <link href="style.css" rel="stylesheet">
        <!--this is internal css-->
        <style>
            h1{
                border:5px solid green;
            }
        </style>
    </head>
    <body>
        <!--We give styling inside a tag using style attribute -->
        <h1>I am internal css</h1>
    <h1 style="background-color: rgb(254, 163, 173);">I am inline css</h1>
    <p>I am external css</p>
    </body>
</html>
